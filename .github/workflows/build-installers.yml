name: Build desktop installers

# Installer builds are deliberately separate from ordinary CI. They run only
# when explicitly requested in Actions or when a version tag is pushed.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  package:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            command: npm run dist:mac
            artifact: rocket-fuel-macos-universal
            files: release/*.dmg
          - platform: windows
            os: windows-latest
            command: npm run dist:win
            artifact: rocket-fuel-windows-x64
            files: release/*.exe
          - platform: linux
            os: ubuntu-latest
            command: npm run dist:linux
            artifact: rocket-fuel-linux-x64
            files: |
              release/*.AppImage
              release/*.deb
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    env:
      # These are intentionally unsigned internal camp-team builds.
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: ${{ matrix.command }}
      - run: npm run verify:artifacts -- ${{ matrix.platform }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.files }}
          if-no-files-found: error
          retention-days: 14

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: rocket-fuel-*
          path: release-assets
          merge-multiple: true
      - name: Verify release bundle
        run: |
          ls release-assets/*.dmg
          ls release-assets/*.exe
          ls release-assets/*.AppImage
          ls release-assets/*.deb
      - name: Generate SHA-256 checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --verify-tag \
              --title "Rocket Fuel Camp Points ${GITHUB_REF_NAME}" \
              --generate-notes
          fi
