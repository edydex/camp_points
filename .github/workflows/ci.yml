name: CI

on:
  push:
    branches: [main, 'codex/**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install-deps chromium
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: xvfb-run -a npx playwright test
